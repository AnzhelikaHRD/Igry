<head>

<title>KEVIN · Що за посада?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --yellow:#FFD300; --yellow-deep:#F0BD40; --turq:#3DB4BF; --turq-deep:#2c8f99;
    --orange:#EB7C22; --red:#E2574C; --green:#3DBE7A; --green-deep:#2fa566;
    --ink:#56433b; --ink-deep:#453636; --cream:#FFFDF6; --surface:#ffffff; --shadow:rgba(86,67,59,.18);
    --p1:#FFE283; --p2:#A7E3E9; --p3:#F9C098; --p4:#FFDA4D;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{height:100%}
  body{font-family:"Montserrat",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);height:100dvh;overflow:hidden;
    background:radial-gradient(120% 90% at 50% -10%, #FFF3CF 0%, var(--cream) 55%, #FFFBF0 100%)}
  .back-link{position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;z-index:60;display:inline-flex;align-items:center;gap:6px;
    font-family:"Montserrat",system-ui,sans-serif;font-weight:800;font-size:13px;color:#56433b;text-decoration:none;
    background:rgba(255,255,255,.96);border:2px solid rgba(86,67,59,.16);border-radius:999px;padding:8px 14px 8px 11px;
    box-shadow:0 8px 20px -6px rgba(86,67,59,.18);-webkit-tap-highlight-color:transparent}
  .back-link:active{transform:translateY(1px)}

  .wrap{max-width:min(98vw,1180px);height:100dvh;margin:0 auto;padding:clamp(10px,2vh,18px) 12px;
    display:flex;flex-direction:column;align-items:center;text-align:center;gap:clamp(5px,1vh,11px)}
  .brand{height:clamp(34px,5vh,44px)} .brand svg{height:100%;width:auto;display:block}
  h1{font-weight:900;font-size:clamp(26px,5vw,42px);letter-spacing:-.02em;line-height:1.04;color:var(--ink-deep)}
  h1 .spark{color:var(--yellow-deep)}
  .subtitle{font-weight:600;font-size:clamp(13px,2.2vw,16px);color:var(--ink);opacity:.74;max-width:34ch}
  .count-pill{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:2px solid var(--yellow);
    color:var(--ink-deep);font-weight:700;font-size:13px;padding:6px 14px;border-radius:999px;box-shadow:0 6px 18px var(--shadow)}
  .count-pill b{color:var(--yellow-deep);font-weight:900}

  .controls{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center}
  .btn{font-family:inherit;font-weight:800;font-size:14px;color:var(--ink-deep);background:#fff;
    border:2px solid rgba(86,67,59,.16);border-radius:999px;padding:9px 16px;cursor:pointer;
    box-shadow:0 8px 20px -8px var(--shadow);transition:transform .12s ease, box-shadow .12s ease;-webkit-tap-highlight-color:transparent;
    display:inline-flex;align-items:center;gap:8px}
  .btn:hover{transform:translateY(-2px)} .btn:active{transform:translateY(1px)}
  .btn[hidden]{display:none}
  .btn.primary{background:var(--yellow);border-color:var(--yellow-deep)}
  .btn.ghost{background:rgba(255,255,255,.7)}
  .btn.good{background:var(--green);border-color:var(--green-deep);color:#fff}
  .btn.bad{background:#fff;border-color:rgba(86,67,59,.22);color:var(--ink)}
  .btn.off{opacity:.6}
  .status{font-weight:700;font-size:13px;color:var(--ink);opacity:.78}
  .status b{color:var(--ink-deep)}

  .board-area{flex:1;min-height:0;width:100%;display:flex;align-items:center;justify-content:center}
  .board{display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);gap:clamp(5px,1.1vmin,13px)}
  @media (max-height:600px){ .subtitle{display:none} .count-pill{display:none} }

  .note{position:relative;border:none;border-radius:6px;cursor:pointer;background:var(--paper,var(--p1));
    transform:rotate(var(--rot,0deg));transition:transform .15s ease;-webkit-tap-highlight-color:transparent;outline:none;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 20px -10px rgba(86,67,59,.45), inset 0 1px 0 rgba(255,255,255,.5)}
  .note::after{content:"";position:absolute;right:0;bottom:0;width:0;height:0;border-style:solid;
    border-width:0 0 18px 18px;border-color:transparent transparent rgba(86,67,59,.16) transparent}
  .note::before{content:"";position:absolute;left:50%;top:6px;transform:translateX(-50%) rotate(-2deg);
    width:42%;height:11px;background:rgba(255,255,255,.45);border-radius:2px}
  .note:hover{transform:rotate(0deg) translateY(-3px) scale(1.04);z-index:3}
  .note:focus-visible{outline:3px solid var(--turq);outline-offset:3px}
  .note .num{font-weight:900;font-size:var(--num,22px);color:var(--ink-deep);opacity:.92}
  .note .stamp{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-size:var(--num,30px);font-weight:900}
  .note.used{cursor:default;opacity:.5;filter:grayscale(.45);box-shadow:none}
  .note.used::before,.note.used::after{display:none}
  .note.used:hover{transform:rotate(var(--rot,0deg))}
  .note.used .num{opacity:.28}
  .note.used .stamp{display:flex}
  .note.guessed .stamp{color:var(--green-deep)}
  .note.missed .stamp{color:#9b827c}

  /* ---------- round modal ---------- */
  .modal{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:18px;
    background:rgba(69,54,54,.55);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
  .modal[hidden]{display:none}
  .sheet{position:relative;width:min(92vw,440px);background:var(--cream);border-radius:24px;
    padding:clamp(22px,4vw,30px);box-shadow:0 30px 70px -20px rgba(69,54,54,.6);text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:clamp(11px,2.2vh,17px)}
  .close{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;
    background:rgba(86,67,59,.08);color:var(--ink);font-weight:800;font-size:15px;line-height:1}
  .close:hover{background:rgba(86,67,59,.16)}
  .rnum{font-weight:900;font-size:14px;letter-spacing:.05em;color:var(--ink);background:#fff;
    border:2px solid rgba(86,67,59,.12);padding:5px 16px;border-radius:999px}
  .timer{position:relative;width:clamp(96px,18vh,120px);height:clamp(96px,18vh,120px);flex:0 0 auto}
  .timer svg{width:100%;height:100%;transform:rotate(-90deg)}
  .timer .track{fill:none;stroke:rgba(86,67,59,.14);stroke-width:11}
  .timer .bar{fill:none;stroke:var(--turq);stroke-width:11;stroke-linecap:round;transition:stroke .3s}
  .timer .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:clamp(30px,6vh,42px);color:var(--ink-deep)}
  .timer.warn .bar{stroke:var(--yellow-deep)} .timer.warn .num{color:var(--yellow-deep)}
  .timer.danger .bar{stroke:var(--red)} .timer.danger .num{color:var(--red)}
  .timer.done{animation:shake .4s}
  @keyframes shake{10%,90%{transform:translateX(-2px)}30%,70%{transform:translateX(4px)}50%{transform:translateX(-5px)}}
  .pos-wrap{width:100%;min-height:clamp(58px,10vh,84px);display:flex;align-items:center;justify-content:center}
  .pos{font-weight:900;font-size:30px;line-height:1.1;color:var(--ink-deep);word-break:break-word}
  .pos-hidden{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--ink);opacity:.55;font-weight:700;font-size:13.5px}
  .pos-hidden svg{width:30px;height:30px;opacity:.7}
  [hidden]{display:none !important}
  .hint2{font-weight:600;font-size:12.5px;color:var(--ink);opacity:.62;max-width:32ch}
  .rbtns{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;width:100%}

  .conf{position:fixed;inset:0;pointer-events:none;z-index:90;overflow:hidden}
  .conf i{position:absolute;top:-12px;width:9px;height:14px;border-radius:2px;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(640deg)}}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);z-index:95;
    background:var(--ink-deep);color:#fff;font-weight:800;font-size:14px;padding:11px 20px;border-radius:999px;
    box-shadow:0 16px 34px -12px rgba(86,67,59,.5);opacity:0;pointer-events:none;transition:opacity .35s ease, transform .35s ease}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<script>
const POSITIONS = [
  "Фінансовий менеджер",
  "HRG",
  "Регіональний менеджер",
  "Head of product",
  "Прі-сейл",
  "Персональний менеджер",
  "Head of sales",
  "Діагност",
  "Рекрутер",
  "HRD",
  "Технічний спеціаліст",
  "СММ",
  "Маркетолог воронок",
  "CFO",
  "Куратор предмету",
  "Методист",
  "Менеджер кол центр",
  "Head of marketing",
  "CEO",
  "Тренер відділу продажів",
  "Сервіс менеджер",
  "Менеджер дірект",
  "Викладач курсу",
  "Таргетолог",
  "Перформенс маркетолог"
];
const N = POSITIONS.length;
const SECONDS = 90;
const PAPERS = ["var(--p1)","var(--p2)","var(--p3)","var(--p4)"];
const byId = id => document.getElementById(id);
const board=byId("board"), boardArea=document.querySelector(".board-area"), statusEl=byId("status"), conf=byId("conf"), toast=byId("toast");
const modal=byId("round"), rnum=byId("rnum"), rpos=byId("rpos"), posHidden=byId("posHidden");
const timer=byId("timer"), timerBar=byId("timerBar"), timeNum=byId("timeNum");
const revealBtn=byId("revealBtn"), startBtn=byId("startBtn"), pauseBtn=byId("pauseBtn"), okBtn=byId("okBtn"), failBtn=byId("failBtn"), cancelBtn=byId("cancelBtn");

let order=[];                 // order[i] = position index hidden under note i
let used=new Set();           // note indices already played
let guessedCount=0;
let current=null;             // currently drawn note index
const C=2*Math.PI*54; timerBar.style.strokeDasharray=C.toFixed(2);
let endTime=0, remainingMs=SECONDS*1000, running=false, paused=false, rafId=null, lastBeep=null;

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function buildBoard(){
  order=shuffle([...Array(N).keys()]); used=new Set(); guessedCount=0;
  board.innerHTML="";
  for(let i=0;i<N;i++){
    const n=document.createElement("button");
    n.className="note";
    n.style.setProperty("--paper",PAPERS[i%PAPERS.length]);
    n.style.setProperty("--rot",(Math.random()*4-2).toFixed(2)+"deg");
    n.dataset.i=i;
    n.innerHTML='<span class="num">'+(i+1)+'</span><span class="stamp"></span>';
    n.addEventListener("click",()=>{ if(!used.has(i)) openRound(i); });
    board.appendChild(n);
  }
  updateStatus();
  requestAnimationFrame(sizeBoard);
}
function updateStatus(){
  statusEl.innerHTML="Зіграно <b>"+used.size+"</b> / "+N+" · вгадано <b>"+guessedCount+"</b>";
}

/* ---------- round ---------- */
function openRound(i){
  current=i;
  rnum.textContent="№ "+(i+1);
  rpos.textContent=POSITIONS[order[i]];
  // reset UI to "hidden / not started"
  posHidden.hidden=false; rpos.hidden=true;
  revealBtn.hidden=false; startBtn.hidden=true; pauseBtn.hidden=true; okBtn.hidden=true; failBtn.hidden=true;
  timer.classList.remove("warn","danger","done"); timerBar.style.strokeDashoffset="0"; timeNum.textContent=SECONDS;
  running=false; paused=false; remainingMs=SECONDS*1000; lastBeep=null; cancelAnimationFrame(rafId);
  modal.hidden=false;
  ensureAudio();
}
function revealPos(){
  posHidden.hidden=true; rpos.hidden=false;
  revealBtn.hidden=true; startBtn.hidden=false;
  fitPos();
}
function fitPos(){
  let s=32; rpos.style.fontSize=s+"px";
  const wrap=rpos.parentElement;
  while(s>14 && (rpos.scrollWidth>wrap.clientWidth-8 || rpos.scrollHeight>wrap.clientHeight+1)){ s--; rpos.style.fontSize=s+"px"; }
}
function startTimer(){
  startBtn.hidden=true; pauseBtn.hidden=false; okBtn.hidden=false; failBtn.hidden=false;
  pauseBtn.textContent="Пауза";
  timer.classList.remove("warn","danger","done");
  running=true; paused=false; remainingMs=SECONDS*1000; endTime=performance.now()+remainingMs; lastBeep=null;
  cancelAnimationFrame(rafId); loop();
}
function loop(){
  remainingMs=Math.max(0,endTime-performance.now());
  render(remainingMs);
  if(remainingMs<=0){ timeUp(); return; }
  const whole=Math.ceil(remainingMs/1000);
  if(whole<=10 && whole!==lastBeep){ lastBeep=whole; beep(880,0.08,0.16); }
  rafId=requestAnimationFrame(loop);
}
function render(ms){
  const sec=Math.ceil(ms/1000); timeNum.textContent=sec;
  const frac=ms/(SECONDS*1000); timerBar.style.strokeDashoffset=(C*(1-frac)).toFixed(2);
  timer.classList.toggle("warn", sec<=30 && sec>10);
  timer.classList.toggle("danger", sec<=10);
}
function timeUp(){
  running=false; timer.classList.add("danger","done"); buzzer();
  pauseBtn.hidden=true;  // only resolve buttons remain
}
function togglePause(){
  if(!running && !paused) return;
  if(!paused){ paused=true; running=false; cancelAnimationFrame(rafId); pauseBtn.textContent="Продовжити"; }
  else{ paused=false; running=true; endTime=performance.now()+remainingMs; pauseBtn.textContent="Пауза"; loop(); }
}
function markUsed(i,guessed){
  used.add(i);
  if(guessed) guessedCount++;
  const el=board.querySelector('.note[data-i="'+i+'"]');
  if(el){ el.classList.add("used", guessed?"guessed":"missed"); el.querySelector(".stamp").textContent=guessed?"✓":"✕"; }
  updateStatus();
  if(used.size===N){ celebrate(); showToast("Усі 25 посад зіграно! 🎉"); }
}
function resolve(guessed){
  if(current===null) return;
  if(guessed){ ding(); confettiBurst(); } else { blip(); }
  markUsed(current,guessed);
  closeModal();
}
function closeModal(){
  running=false; paused=false; cancelAnimationFrame(rafId);
  modal.hidden=true; current=null;
}
function randomDraw(){
  const free=[]; for(let i=0;i<N;i++) if(!used.has(i)) free.push(i);
  if(!free.length){ showToast("Усі стікери зіграно — тисни «Почати заново»"); return; }
  openRound(free[Math.floor(Math.random()*free.length)]);
}

revealBtn.addEventListener("click",revealPos);
startBtn.addEventListener("click",startTimer);
pauseBtn.addEventListener("click",togglePause);
okBtn.addEventListener("click",()=>resolve(true));
failBtn.addEventListener("click",()=>resolve(false));
cancelBtn.addEventListener("click",closeModal);
byId("drawBtn").addEventListener("click",randomDraw);
byId("resetBtn").addEventListener("click",()=>{ closeModal(); buildBoard(); blip(); showToast("Нова гра"); });
modal.addEventListener("click",e=>{ if(e.target===modal) closeModal(); });

/* ---------- celebration ---------- */
let toastT=null;
function showToast(m){ toast.textContent=m; toast.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>toast.classList.remove("show"),2600); }
function confettiBurst(n){ const colors=["#FFD300","#3DB4BF","#EB7C22","#F0BD40","#3DBE7A"]; n=n||34;
  for(let i=0;i<n;i++){ const s=document.createElement("i"); s.style.left=Math.random()*100+"vw"; s.style.background=colors[i%colors.length];
    s.style.animationDuration=(2+Math.random()*1.6)+"s"; s.style.animationDelay=(Math.random()*0.3)+"s"; conf.appendChild(s); setTimeout(()=>s.remove(),4200); } }
function celebrate(){ confettiBurst(80); winSound(); }

/* ---------- audio ---------- */
let actx=null, master=null, soundOn=true;
function ensureAudio(){ if(!soundOn) return; if(actx){ if(actx.state==="suspended") actx.resume(); return; }
  const AC=window.AudioContext||window.webkitAudioContext; if(!AC){ soundOn=false; renderSound(); return; }
  actx=new AC(); master=actx.createGain(); master.gain.value=0.75; master.connect(actx.destination); }
function tone(type,f,st,dur,vol){ const o=actx.createOscillator(), g=actx.createGain(); o.type=type; o.frequency.value=f;
  g.gain.setValueAtTime(0.0001,st); g.gain.exponentialRampToValueAtTime(vol,st+0.02); g.gain.exponentialRampToValueAtTime(0.0001,st+dur);
  o.connect(g); g.connect(master); o.start(st); o.stop(st+dur+0.02); }
function beep(f,dur,vol){ ensureAudio(); if(!soundOn||!actx) return; tone("sine",f,actx.currentTime,dur,vol); }
function ding(){ ensureAudio(); if(!soundOn||!actx) return; const t=actx.currentTime; tone("triangle",659.25,t,0.18,0.24); tone("triangle",987.77,t+0.07,0.22,0.22); }
function blip(){ ensureAudio(); if(!soundOn||!actx) return; tone("sine",300,actx.currentTime,0.12,0.16); }
function buzzer(){ ensureAudio(); if(!soundOn||!actx) return; const t=actx.currentTime; [392,330,262].forEach((f,i)=>tone("sawtooth",f,t+i*0.16,0.34,0.3)); }
function winSound(){ ensureAudio(); if(!soundOn||!actx) return; [523,659,784,1047].forEach((f,i)=>tone("triangle",f,actx.currentTime+i*0.11,0.16,0.18)); }

const soundToggle=byId("soundToggle"), soundLabel=byId("soundLabel"), soundIco=byId("soundIco");
const ICON_ON='<svg viewBox="0 0 24 24" fill="none"><path d="M4 9v6h4l5 4V5L8 9H4Z" fill="#56433b"/><path d="M16 8.5a4 4 0 0 1 0 7" stroke="#3DB4BF" stroke-width="2" stroke-linecap="round"/></svg>';
const ICON_OFF='<svg viewBox="0 0 24 24" fill="none"><path d="M4 9v6h4l5 4V5L8 9H4Z" fill="#56433b"/><path d="m16 9 5 6M21 9l-5 6" stroke="#9b827c" stroke-width="2" stroke-linecap="round"/></svg>';
function renderSound(){ soundToggle.classList.toggle("off",!soundOn); soundToggle.setAttribute("aria-pressed",String(soundOn));
  soundLabel.textContent=soundOn?"Звук":"Без звуку"; soundIco.innerHTML=soundOn?ICON_ON:ICON_OFF; }
soundToggle.addEventListener("click",()=>{ soundOn=!soundOn; if(soundOn) ensureAudio(); renderSound(); });
renderSound();

function sizeBoard(){
  const r=boardArea.getBoundingClientRect();
  const cols=5, rows=5;
  const gap=parseFloat(getComputedStyle(board).gap)||10;
  const RATIO=1.6, MAXH=190;
  let cellH=(r.height-gap*(rows-1))/rows;
  let cellW=(r.width -gap*(cols-1))/cols;
  cellH=Math.min(cellH, MAXH);
  cellW=Math.min(cellW, cellH*RATIO);   // fill width, capped to landscape
  cellH=Math.min(cellH, cellW);          // never portrait (square on narrow screens)
  cellW=Math.max(cellW,1); cellH=Math.max(cellH,1);
  board.style.width =Math.floor(cellW*cols+gap*(cols-1))+"px";
  board.style.height=Math.floor(cellH*rows+gap*(rows-1))+"px";
  board.style.setProperty("--num",Math.round(Math.min(cellW,cellH)*0.42)+"px");
}
let szT=null;
window.addEventListener("resize",()=>{ clearTimeout(szT); szT=setTimeout(sizeBoard,120); });

buildBoard();
</script>
</body>
</html>
