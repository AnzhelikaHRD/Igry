<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEVIN · Три слова — одне речення</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --yellow:#FFD300; --yellow-deep:#F0BD40;
    --turq:#3DB4BF; --turq-deep:#2c8f99; --turq-light:#76CFE5;
    --ink:#56433b; --ink-deep:#453636;
    --cream:#FFFDF6; --surface:#ffffff;
    --red:#E5533D;
    --shadow:rgba(86,67,59,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Montserrat",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    color:var(--ink);
    background:radial-gradient(120% 90% at 50% -10%, #FFF3CF 0%, var(--cream) 55%, #FFFBF0 100%);
    height:100vh;height:100dvh;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;
    padding:clamp(10px,2vh,22px) 14px;
  }

  /* Header */
  header{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px;margin-bottom:clamp(8px,1.5vh,16px)}
  .brand{height:38px}
  .brand svg{height:100%;width:auto;display:block}
  h1{font-weight:900;font-size:clamp(22px,3.8vw,34px);letter-spacing:-.02em;line-height:1.04;color:var(--ink-deep)}
  h1 .spark{color:var(--yellow-deep)}
  .rule{font-weight:600;font-size:clamp(12px,2vw,15px);color:var(--ink);opacity:.78;max-width:42ch}

  /* Toolbar */
  .toolbar{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:10px;margin-top:4px}
  .counter{
    display:inline-flex;align-items:center;gap:7px;
    background:var(--surface);border:2px solid var(--yellow);color:var(--ink-deep);
    font-weight:700;font-size:13px;padding:7px 14px;border-radius:999px;box-shadow:0 5px 14px var(--shadow);
  }
  .counter b{color:var(--yellow-deep);font-weight:900}
  .pill-btn{
    display:inline-flex;align-items:center;gap:7px;font-family:inherit;font-weight:700;font-size:13px;color:var(--ink);
    background:var(--surface);border:2px solid rgba(86,67,59,.18);padding:7px 14px;border-radius:999px;cursor:pointer;
    box-shadow:0 5px 14px var(--shadow);transition:border-color .15s,opacity .15s;
  }
  .pill-btn:hover{border-color:var(--turq)}
  .pill-btn:focus-visible{outline:3px solid var(--turq);outline-offset:3px}
  .pill-btn.off{opacity:.6}
  .pill-btn .ico{width:17px;height:17px;display:inline-flex}
  .pill-btn .ico svg{width:100%;height:100%}

  /* Deck grid — 10 cards as 5 × 2 (5 top / 5 bottom), all visible */
  .deck{
    --cw: min(18vw, 27vh);
    flex:1 1 auto;min-height:0;
    display:grid;
    grid-template-columns:repeat(5, var(--cw));
    align-content:center;justify-content:center;
    gap:clamp(8px,1.5vh,16px);
  }
  .card-tile{
    position:relative;width:var(--cw);aspect-ratio:3/4;border:none;cursor:pointer;
    border-radius:clamp(12px,1.4vw,18px);font-family:inherit;
    background:
      radial-gradient(120% 80% at 50% 12%, #6a554b 0%, var(--ink) 60%, var(--ink-deep) 100%);
    color:var(--cream);
    box-shadow:0 10px 22px -10px var(--shadow);
    display:flex;align-items:center;justify-content:center;
    transition:transform .14s ease, box-shadow .14s ease, opacity .25s ease;
    overflow:hidden;
  }
  .card-tile::before{
    content:"";position:absolute;inset:6px;border-radius:11px;border:2px dashed rgba(255,211,0,.35);
  }
  .card-tile .num{font-weight:900;font-size:calc(var(--cw)*0.34);color:var(--yellow);z-index:1;text-shadow:0 2px 0 rgba(0,0,0,.18)}
  .card-tile .mini-rocket{position:absolute;top:7%;left:50%;transform:translateX(-50%);width:calc(var(--cw)*0.16);height:auto;opacity:.9}
  .card-tile:hover{transform:translateY(-4px);box-shadow:0 16px 28px -12px var(--shadow)}
  .card-tile:focus-visible{outline:3px solid var(--turq);outline-offset:3px}
  .card-tile.used{opacity:.4;cursor:default;transform:none}
  .card-tile.used::after{
    content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:calc(var(--cw)*0.42);font-weight:900;color:var(--turq-light);background:rgba(69,54,54,.45);z-index:2;
  }

  /* keep 5 columns (5 top / 5 bottom) on smaller screens too */
  @media (max-width:520px){
    .deck{--cw:min(18vw,22vh)}
  }

  /* Play overlay */
  .play{
    position:fixed;inset:0;z-index:40;display:none;
    align-items:center;justify-content:center;padding:14px;
    background:rgba(69,54,54,.55);backdrop-filter:blur(4px);
  }
  .play.show{display:flex;animation:fade .25s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .play-inner{
    display:flex;flex-direction:column;align-items:center;
    gap:clamp(10px,1.8vh,18px);
    width:min(92vw,420px);max-height:94dvh;
    background:var(--surface);border:2px solid rgba(255,211,0,.55);
    border-radius:28px;padding:clamp(16px,2.6vh,26px);
    box-shadow:0 40px 90px -24px rgba(69,54,54,.65);
  }

  .flip-wrap{perspective:1400px;height:min(40vh,300px);aspect-ratio:5/6;flex:0 0 auto}
  .flip-card{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.2,.8,.2,1)}
  .flip-card.flipped{transform:rotateY(180deg)}
  .flip-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    box-shadow:0 18px 40px -16px rgba(69,54,54,.5)}
  .flip-back{
    background:radial-gradient(120% 80% at 50% 12%, #6a554b 0%, var(--ink) 60%, var(--ink-deep) 100%);
    color:var(--cream);gap:8px;
  }
  .flip-back .num{font-weight:900;font-size:clamp(48px,9vh,78px);color:var(--yellow)}
  .flip-back .lbl{font-weight:700;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--turq-light)}
  .flip-front{
    transform:rotateY(180deg);
    background:linear-gradient(180deg,#fff 0%, #FFFEFA 100%);
    border:3px solid var(--yellow);gap:clamp(8px,1.6vh,14px);padding:clamp(12px,2.2vh,18px);
  }
  .word{
    width:100%;text-align:center;font-weight:800;line-height:1.08;
    font-size:clamp(18px,3.6vh,30px);
    padding:clamp(8px,1.6vh,14px) 12px;border-radius:14px;letter-spacing:-.01em;
  }
  .word.c0{background:var(--yellow);color:var(--ink-deep)}
  .word.c1{background:var(--turq);color:#fff}
  .word.c2{background:var(--ink);color:var(--cream)}

  /* Timer */
  .timer{position:relative;width:clamp(92px,15vh,118px);height:clamp(92px,15vh,118px);flex:0 0 auto}
  .timer svg{width:100%;height:100%;transform:rotate(-90deg)}
  .timer .track{fill:none;stroke:rgba(86,67,59,.14);stroke-width:11}
  .timer .bar{fill:none;stroke:var(--turq);stroke-width:11;stroke-linecap:round;transition:stroke .3s}
  .timer .num{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-weight:900;font-size:clamp(30px,6vh,42px);color:var(--ink-deep);
  }
  .timer.warn .bar{stroke:var(--yellow-deep)} .timer.warn .num{color:var(--yellow-deep)}
  .timer.danger .bar{stroke:var(--red)} .timer.danger .num{color:var(--red)}
  .timer.done{animation:shake .4s}
  @keyframes shake{10%,90%{transform:translateX(-2px)}30%,70%{transform:translateX(4px)}50%{transform:translateX(-5px)}}
  .timeup{font-weight:900;font-size:18px;color:var(--red);height:20px;letter-spacing:.02em}

  .play-controls{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
  .pbtn{font-family:inherit;font-weight:800;font-size:15px;border:none;border-radius:999px;padding:12px 22px;cursor:pointer;
    transition:transform .1s ease,box-shadow .1s ease,filter .15s}
  .pbtn:active{transform:translateY(3px)}
  .pbtn:focus-visible{outline:3px solid var(--ink);outline-offset:3px}
  .pbtn.ghost{background:var(--surface);color:var(--ink);box-shadow:0 5px 0 #d9cfc7}
  .pbtn.ghost:active{box-shadow:0 2px 0 #d9cfc7}
  .pbtn.primary{background:var(--yellow);color:var(--ink-deep);box-shadow:0 6px 0 #d99e1f}
  .pbtn.primary:active{box-shadow:0 2px 0 #d99e1f}
  .pbtn.done-btn{background:var(--turq);color:#fff;box-shadow:0 6px 0 var(--turq-deep)}
  .pbtn.done-btn:active{box-shadow:0 2px 0 var(--turq-deep)}

  @media (prefers-reduced-motion:reduce){
    .flip-card{transition:transform .15s ease}
    .timer.done{animation:none}
  }
  .back-link{position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;z-index:60;display:inline-flex;align-items:center;gap:6px;
    font-family:"Montserrat",system-ui,sans-serif;font-weight:800;font-size:13px;color:#56433b;text-decoration:none;
    background:rgba(255,255,255,.96);border:2px solid rgba(86,67,59,.16);border-radius:999px;padding:8px 14px 8px 11px;
    box-shadow:0 8px 20px -6px rgba(86,67,59,.18);-webkit-tap-highlight-color:transparent}
  .back-link:active{transform:translateY(1px)}
</style>
</head>

<!-- Play overlay -->
<div class="play" id="play">
  <div class="play-inner">
    <div class="flip-wrap">
      <div class="flip-card" id="flipCard">
        <div class="flip-face flip-back">
          <span class="lbl">Картка</span>
          <span class="num" id="cardNum">1</span>
        </div>
        <div class="flip-face flip-front" id="flipFront">
          <div class="word c0" id="w0"></div>
          <div class="word c1" id="w1"></div>
          <div class="word c2" id="w2"></div>
        </div>
      </div>
    </div>

    <div class="timer" id="timer">
      <svg viewBox="0 0 120 120">
        <circle class="track" cx="60" cy="60" r="54"></circle>
        <circle class="bar" id="timerBar" cx="60" cy="60" r="54"></circle>
      </svg>
      <div class="num" id="timeNum">60</div>
    </div>
    <div class="timeup" id="timeUp"></div>

    <div class="play-controls">
      <button class="pbtn ghost" id="pauseBtn">Пауза</button>
      <button class="pbtn primary" id="restartBtn">Заново</button>
      <button class="pbtn done-btn" id="doneBtn">Готово</button>
    </div>
  </div>

<script>
const CARDS = [
  ["віник","KPI","русалка"],
  ["чайник","онбординг","НЛО"],
  ["прі-сейл","стратегія","ананас"],
  ["ревеню","амброзія","підлога"],
  ["зарядка","нарада","кактус"],
  ["ліфт","HR","акваріум"],
  ["холодильник","презентація","дейлі"],
  ["торт","SQL","мишка"],
  ["музика","маркетинг","кулька"],
  ["Армагедон","задача","шампанське"]
];
const NUM_CARDS = CARDS.length;
const SECONDS = 60;

// ---- Deck ----
const deck = document.getElementById("deck");
const tiles = [];
const used = new Set();
const ROCKET = '<svg class="mini-rocket" viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg"><path d="M30 79 L9 32 Q9 7 30 2 Q51 7 51 32 Z" fill="#FFD300"/><circle cx="30" cy="31" r="8" fill="#3DB4BF" stroke="#fff" stroke-width="2.6"/><path d="M30 79 L20 60 H40 Z" fill="#3DB4BF"/></svg>';

document.getElementById("totalCount").textContent = NUM_CARDS;

function buildDeck(){
  deck.innerHTML = "";
  tiles.length = 0;
  used.clear();
  for (let i = 1; i <= NUM_CARDS; i++){
    const b = document.createElement("button");
    b.className = "card-tile";
    b.setAttribute("aria-label", "Картка " + i);
    b.innerHTML = ROCKET + '<span class="num">' + i + '</span>';
    b.addEventListener("click", () => openCard(i, b));
    deck.appendChild(b);
    tiles.push(b);
  }
  updateCount();
}
function updateCount(){
  document.getElementById("playedCount").textContent = used.size;
}

// ---- Words come from the fixed CARDS list (card N -> CARDS[N-1]) ----

// ---- Play / flip / timer ----
const play = document.getElementById("play");
const flipCard = document.getElementById("flipCard");
const cardNum = document.getElementById("cardNum");
const w = [document.getElementById("w0"), document.getElementById("w1"), document.getElementById("w2")];
const timer = document.getElementById("timer");
const timerBar = document.getElementById("timerBar");
const timeNum = document.getElementById("timeNum");
const timeUpEl = document.getElementById("timeUp");
const pauseBtn = document.getElementById("pauseBtn");
const restartBtn = document.getElementById("restartBtn");
const doneBtn = document.getElementById("doneBtn");

const C = 2 * Math.PI * 54;
timerBar.style.strokeDasharray = C.toFixed(2);
timerBar.style.strokeDashoffset = "0";

let currentNum = null, currentTile = null;
let endTime = 0, remainingMs = SECONDS * 1000;
let running = false, rafId = null, lastBeep = null, startDelay = null;

function openCard(n, tile){
  if (used.has(n)) return;
  currentNum = n; currentTile = tile;
  cardNum.textContent = n;
  const words = CARDS[n - 1];
  w.forEach((el, i) => el.textContent = words[i]);

  // reset visuals
  flipCard.classList.remove("flipped");
  resetTimerVisual();
  timeUpEl.textContent = "";
  pauseBtn.textContent = "Пауза";
  play.classList.add("show");

  // flip (with sound) then start timer
  requestAnimationFrame(() => requestAnimationFrame(() => {
    flipCard.classList.add("flipped");
    playFlip();
  }));
  clearTimeout(startDelay);
  startDelay = setTimeout(() => { playReveal(); startTimer(SECONDS * 1000); }, 650);
}

function resetTimerVisual(){
  timer.classList.remove("warn", "danger", "done");
  timerBar.style.strokeDashoffset = "0";
  timeNum.textContent = SECONDS;
}

function startTimer(ms){
  remainingMs = ms;
  endTime = performance.now() + ms;
  running = true; lastBeep = null;
  cancelAnimationFrame(rafId);
  loop();
}

function loop(){
  const now = performance.now();
  remainingMs = Math.max(0, endTime - now);
  render(remainingMs);
  if (remainingMs <= 0){ timeUp(); return; }
  // countdown beeps in last 10 seconds
  const whole = Math.ceil(remainingMs / 1000);
  if (whole <= 10 && whole !== lastBeep){ lastBeep = whole; beep(880, 0.08, 0.16); }
  rafId = requestAnimationFrame(loop);
}

function render(ms){
  const sec = Math.ceil(ms / 1000);
  timeNum.textContent = sec;
  const frac = ms / (SECONDS * 1000);
  timerBar.style.strokeDashoffset = (C * (1 - frac)).toFixed(2);
  timer.classList.toggle("warn", sec <= 20 && sec > 10);
  timer.classList.toggle("danger", sec <= 10);
}

function timeUp(){
  running = false;
  timeNum.textContent = "0";
  timerBar.style.strokeDashoffset = C.toFixed(2);
  timer.classList.add("danger", "done");
  timeUpEl.textContent = "Час вийшов!";
  buzzer();
}

function pauseResume(){
  if (remainingMs <= 0) return;
  if (running){
    running = false;
    cancelAnimationFrame(rafId);
    pauseBtn.textContent = "Продовжити";
  } else {
    clearTimeout(startDelay);
    endTime = performance.now() + remainingMs;
    running = true;
    pauseBtn.textContent = "Пауза";
    loop();
  }
}

function restart(){
  clearTimeout(startDelay);
  cancelAnimationFrame(rafId);
  timer.classList.remove("done");
  timeUpEl.textContent = "";
  pauseBtn.textContent = "Пауза";
  startTimer(SECONDS * 1000);
}

function doneCard(){
  clearTimeout(startDelay);
  cancelAnimationFrame(rafId);
  running = false;
  play.classList.remove("show");
  if (currentNum != null && !used.has(currentNum)){
    used.add(currentNum);
    if (currentTile) currentTile.classList.add("used");
    updateCount();
  }
  currentNum = null; currentTile = null;
}

pauseBtn.addEventListener("click", pauseResume);
restartBtn.addEventListener("click", restart);
doneBtn.addEventListener("click", doneCard);
document.addEventListener("keydown", (e) => {
  if (!play.classList.contains("show")) return;
  if (e.key === "Escape") doneCard();
  else if (e.code === "Space"){ e.preventDefault(); pauseResume(); }
});

document.getElementById("newSetBtn").addEventListener("click", () => {
  if (play.classList.contains("show")) doneCard();
  buildDeck();
});

// ---- Sound ----
let actx = null, master = null, soundOn = true;
function ensureAudio(){
  if (!soundOn) return;
  if (actx){ if (actx.state === "suspended") actx.resume(); return; }
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC){ soundOn = false; renderSound(); return; }
  actx = new AC();
  master = actx.createGain(); master.gain.value = 0.7; master.connect(actx.destination);
}
function beep(freq, dur, vol){
  ensureAudio();
  if (!soundOn || !actx) return;
  const t = actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = "sine"; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(master); o.start(t); o.stop(t + dur + 0.02);
}
function buzzer(){
  ensureAudio();
  if (!soundOn || !actx) return;
  const t = actx.currentTime;
  [392, 330, 262].forEach((f, i) => {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = "sawtooth"; o.frequency.value = f;
    const st = t + i * 0.16;
    g.gain.setValueAtTime(0.0001, st);
    g.gain.exponentialRampToValueAtTime(0.3, st + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, st + 0.34);
    o.connect(g); g.connect(master); o.start(st); o.stop(st + 0.38);
  });
}
function playFlip(){
  ensureAudio();
  if (!soundOn || !actx) return;
  const t = actx.currentTime;
  const len = Math.floor(actx.sampleRate * 0.3);
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = actx.createBufferSource(); src.buffer = buf;
  const bp = actx.createBiquadFilter(); bp.type = "bandpass"; bp.Q.value = 0.9;
  bp.frequency.setValueAtTime(380, t);
  bp.frequency.exponentialRampToValueAtTime(2600, t + 0.2);
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.22, t + 0.05);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.26);
  src.connect(bp); bp.connect(g); g.connect(master);
  src.start(t); src.stop(t + 0.3);
}
function playReveal(){
  ensureAudio();
  if (!soundOn || !actx) return;
  const t = actx.currentTime;
  [587.33, 880].forEach((f, i) => {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = "triangle"; o.frequency.value = f;
    const st = t + i * 0.08;
    g.gain.setValueAtTime(0.0001, st);
    g.gain.exponentialRampToValueAtTime(0.2, st + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, st + 0.3);
    o.connect(g); g.connect(master); o.start(st); o.stop(st + 0.34);
  });
}

const soundToggle = document.getElementById("soundToggle");
const soundLabel = document.getElementById("soundLabel");
const soundIco = document.getElementById("soundIco");
const ICON_ON = '<svg viewBox="0 0 24 24" fill="none"><path d="M4 9v6h4l5 4V5L8 9H4Z" fill="#56433b"/><path d="M16 8.5a4 4 0 0 1 0 7" stroke="#3DB4BF" stroke-width="2" stroke-linecap="round"/></svg>';
const ICON_OFF = '<svg viewBox="0 0 24 24" fill="none"><path d="M4 9v6h4l5 4V5L8 9H4Z" fill="#56433b"/><path d="m16 9 5 6M21 9l-5 6" stroke="#9b827c" stroke-width="2" stroke-linecap="round"/></svg>';
function renderSound(){
  soundToggle.classList.toggle("off", !soundOn);
  soundToggle.setAttribute("aria-pressed", String(soundOn));
  soundLabel.textContent = soundOn ? "Звук" : "Без звуку";
  soundIco.innerHTML = soundOn ? ICON_ON : ICON_OFF;
}
soundToggle.addEventListener("click", () => {
  soundOn = !soundOn;
  if (soundOn) ensureAudio();
  renderSound();
});

// init
buildDeck();
renderSound();
</script>
